# OpenClaw Agent — Paper 模式示例配置
# 用于: openclaw-agent-once / openclaw-agent-loop --config configs/openclaw_agent.paper.yaml
# 值偏保守，适合本地 paper 环境

name: openclaw-paper
symbols:
  - NVDA
  - SPY
capital: 10000
benchmark: SPY
interval_seconds: 300
mode: paper
use_mock: true
use_llm: false

# Risk policy（与 pipeline 内 RiskPolicyEngine 默认一致；此处作记录与未来扩展）
max_position_size: 0.2
max_turnover: 0.3
max_orders_per_run: 10
min_cash_buffer: 0.05

stop_after_consecutive_failures: 5
paper_enabled: true

# 可选: runs_root，不设则使用默认 runs/
# runs_root: ./runs
